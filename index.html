<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тренажер: Экономика Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="./tele-secure.js" defer></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --blue: #2563eb;
            --green: #16a34a; --red: #dc2626; --text: #f1f5f9;
            --border: #334155;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .hidden { display: none; }
        
        /* ОКНО АКТИВАЦИИ */
        #paywall {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; box-sizing: border-box;
        }
        .pay-card { background: var(--card); border: 2px solid var(--blue); padding: 25px; border-radius: 24px; text-align: center; width: 100%; max-width: 360px; }
        .card-num { background: #000; padding: 15px; border-radius: 12px; font-family: monospace; font-size: 1.1em; color: #fff; margin: 15px 0; border: 1px dashed var(--blue); user-select: all; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; font-size: 1em; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-blue { background: var(--blue); }
        .btn-gray { background: #334155; }
        .btn:active { transform: scale(0.97); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--border); background: #0f172a; color: white; box-sizing: border-box; font-size: 1em; }
        .item-box { background: #131d31; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
        .timer { font-size: 1.8em; text-align: center; color: #38bdf8; font-weight: 800; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="paywall">
    <div class="pay-card" id="step-1">
        <h2 style="margin:0;">💳 Активация</h2>
        <p style="color: #94a3b8; font-size: 0.85em; margin: 15px 0;">Для доступа переведите оплату и скиньте скриншот:</p>
        <div class="card-num">9860 1234 5678 9012</div> <a href="https://t.me/nurislombekm" target="_blank" class="btn btn-blue">Связаться с админом</a>
        <button class="btn btn-gray" onclick="showStep(2)">У меня есть ключ</button>
    </div>

    <div class="pay-card hidden" id="step-2">
        <h3>Ввод ключа</h3>
        <p id="user-id-label" style="font-size: 0.8em; color: var(--blue); font-weight: bold;"></p>
        <input type="text" id="input-key" placeholder="XXXX-ID_ПОЛЬЗОВАТЕЛЯ">
        <button class="btn btn-blue" onclick="validateKey()">Активировать доступ</button>
        <button class="btn btn-gray" onclick="showStep(1)">Назад</button>
    </div>
</div>

<div id="main-app" class="hidden">
    <div style="text-align: center; margin-bottom: 15px;">
        <a href="https://t.me/nurislombekm" target="_blank" style="color:var(--blue); text-decoration:none; font-size:0.8em; border:1px solid var(--blue); padding:5px 15px; border-radius:20px;">РАЗРАБОТКА: @NURISLOMBEKM</a>
    </div>

    <div id="screen-menu" class="card">
        <h1 style="text-align: center; margin-top: 0;">Экономика Pro</h1>
        <p id="tg-name" style="text-align: center; color: #94a3b8; font-size: 0.9em;"></p>
        
        <label style="font-size: 0.8em;">Вопросов:</label>
        <input type="number" id="set-count" value="20">
        
        <label style="font-size: 0.8em;">Время (сек):</label>
        <input type="number" id="set-time" value="1200">

        <button class="btn btn-blue" onclick="initTest()">⚡ Начать экзамен</button>
        <button class="btn btn-gray" onclick="openSection('study')">📖 База вопросов</button>
        <button class="btn btn-gray" onclick="openSection('history')">📜 Моя история</button>
    </div>

    <div id="screen-test" class="card hidden">
        <div id="timer-val" class="timer">00:00</div>
        <div id="q-text" style="font-weight: bold; margin-bottom: 20px; font-size: 1.1em;"></div>
        <div id="options-list"></div>
        <button id="btn-next" class="btn btn-blue hidden" onclick="nextQuestion()">Следующий вопрос</button>
    </div>

    <div id="screen-list" class="card hidden">
        <h2 id="list-header"></h2>
        <div id="list-container" style="max-height: 55vh; overflow-y: auto;"></div>
        <button class="btn btn-blue" onclick="location.reload()" style="margin-top: 20px;">В главное меню</button>
    </div>

    <div id="screen-result" class="card hidden">
        <h1 style="text-align: center;">Результат</h1>
        <div id="score-final" style="text-align: center; font-size: 3em; font-weight: 900; color: var(--blue); margin: 20px 0;"></div>
        <button class="btn btn-blue" onclick="location.reload()">Вернуться в меню</button>
    </div>
</div>

<script>
    const SALT = "MY_SECRET_EKO_2026"; // ТВОЙ СЕКРЕТНЫЙ КЛЮЧ (ТАКОЙ ЖЕ В POWERSHELL)
    let database = [], sessionQs = [], userAnswers = [], currentIdx = 0, timerObj, userId = null, userFull = "Гость";

    window.onload = async () => {
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
            const u = window.Telegram.WebApp.initDataUnsafe.user;
            if (u) {
                userId = u.id.toString();
                userFull = u.first_name + (u.username ? ` (@${u.username})` : "");
                document.getElementById('user-id-label').innerText = "Ваш ID: " + userId;
                document.getElementById('tg-name').innerText = "Пользователь: " + userFull;
                
                if (localStorage.getItem('access_id') === userId) unlock();
                if (window.sendVisitNotification) window.sendVisitNotification(userFull);
            }
        }
        fetch('micro_tests.json').then(r => r.json()).then(d => { database = d; });
    };

    function showStep(s) {
        document.getElementById('step-1').classList.toggle('hidden', s !== 1);
        document.getElementById('step-2').classList.toggle('hidden', s !== 2);
    }

    async function validateKey() {
        const input = document.getElementById('input-key').value.trim().toUpperCase();
        if (!userId) return alert("Запустите через Telegram!");

        const msgUint8 = new TextEncoder().encode(userId + SALT);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase().substring(0, 8);
        
        if (input === `${hashHex}-${userId}`) {
            localStorage.setItem('access_id', userId);
            alert("Доступ активирован!");
            unlock();
        } else {
            alert("Ключ не подходит для вашего ID!");
        }
    }

    function unlock() {
        document.getElementById('paywall').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
    }

    function openSection(type) {
        document.getElementById('screen-menu').classList.add('hidden');
        document.getElementById('screen-list').classList.remove('hidden');
        const cont = document.getElementById('list-container');
        if (type === 'study') {
            document.getElementById('list-header').innerText = "База знаний";
            cont.innerHTML = database.map(q => `<div class="item-box"><b>${q.question}</b><br><small style="color:var(--green)">✓ ${q.options[q.answer]}</small></div>`).join('');
        } else {
            document.getElementById('list-header').innerText = "История";
            const h = JSON.parse(localStorage.getItem('my_h') || '[]');
            cont.innerHTML = h.reverse().map(i => `<div class="item-box" style="display:flex; justify-content:space-between"><span>${i.d}</span><b>${i.s}</b></div>`).join('') || "Пусто";
        }
    }

    function initTest() {
        const count = parseInt(document.getElementById('set-count').value);
        sessionQs = [...database].sort(() => 0.5 - Math.random()).slice(0, count);
        userAnswers = new Array(sessionQs.length).fill(null);
        currentIdx = 0;
        document.getElementById('screen-menu').classList.add('hidden');
        document.getElementById('screen-test').classList.remove('hidden');
        startTimer(parseInt(document.getElementById('set-time').value));
        renderQuestion();
    }

    function startTimer(sec) {
        clearInterval(timerObj);
        let left = sec;
        timerObj = setInterval(() => {
            let m = Math.floor(left/60), s = left%60;
            document.getElementById('timer-val').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (--left < 0) finish();
        }, 1000);
    }

    function renderQuestion() {
        const q = sessionQs[currentIdx];
        document.getElementById('q-text').innerText = (currentIdx+1) + ". " + q.question;
        const box = document.getElementById('options-list'); box.innerHTML = "";
        document.getElementById('btn-next').classList.add('hidden');
        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = "item-box"; div.style.cursor = "pointer"; div.innerText = opt;
            div.onclick = () => {
                userAnswers[currentIdx] = i;
                document.querySelectorAll('#options-list .item-box').forEach((el, idx) => {
                    el.onclick = null;
                    if (idx === q.answer) el.style.background = "var(--green)";
                    else if (idx === i) el.style.background = "var(--red)";
                });
                document.getElementById('btn-next').classList.remove('hidden');
            };
            box.appendChild(div);
        });
    }

    function nextQuestion() {
        if (++currentIdx < sessionQs.length) renderQuestion(); else finish();
    }

    function finish() {
        clearInterval(timerObj);
        let correct = 0;
        sessionQs.forEach((q, i) => { if (userAnswers[i] === q.answer) correct++; });
        const resStr = correct + " / " + sessionQs.length;
        document.getElementById('score-final').innerText = resStr;
        
        const h = JSON.parse(localStorage.getItem('my_h') || '[]');
        h.push({d: new Date().toLocaleDateString(), s: resStr});
        localStorage.setItem('my_h', JSON.stringify(h));
        
        if (window.sendSecureReport) window.sendSecureReport(userFull, correct, sessionQs.length);
        document.getElementById('screen-test').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
    }
</script>
</body>
</html>
